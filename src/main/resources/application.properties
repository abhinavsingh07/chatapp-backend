## Application settings
spring.application.name=synk
server.servlet.context-path=/synk
server.port=8080
#Spring framework caching
#logging.level.org.springframework=DEBUG

# Set log levels
logging.level.root=INFO
logging.level.com.yourpackage=DEBUG

# Enable file logging
logging.file.name=logs/app.log

# Customize log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss}  %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Override the console log pattern with an empty value to mute the terminal
logging.pattern.console=

#Cache Logging
#logging.level.org.springframework.cache=TRACE

#spring.profiles.active=${SPRING_PROFILES_ACTIVE}

# expose health, info, metrics and all other actuator endpoints
#management.endpoints.web.exposure.include=health,info,metrics,prometheus

# optional: change base path (default is /actuator)
#management.endpoints.web.base-path=/actuator

# show health details (useful for Docker healthcheck)
#management.endpoint.health.show-details=always

#enable prometheus endpoint
#management.endpoint.prometheus.enabled=true






